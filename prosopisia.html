<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=5"
  />

  <meta
    name="description"
    content="Explore Prosopisia, the biannual international journal of poetry and creative writing published by ARAWLII."
  />

  <meta name="theme-color" content="#0d3328" />

  <title>Prosopisia Journal | ARAWLII</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --ivory: #f7f0e4;
      --paper: #fffaf0;
      --paper-dark: #efe3d0;

      --forest: #0d3328;
      --forest-light: #174a39;
      --forest-dark: #071f19;

      --maroon: #68242a;
      --gold: #bd8b32;
      --gold-light: #dfbd76;

      --text: #251c17;
      --muted: #6e6258;

      --white: #ffffff;
      --border: rgba(189, 139, 50, 0.35);

      --shadow-sm: 0 12px 30px rgba(37, 28, 23, 0.1);
      --shadow-lg: 0 30px 70px rgba(37, 28, 23, 0.18);

      --container: 1180px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 105px;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--text);
      background: var(--ivory);
      font-family: "Inter", sans-serif;
      line-height: 1.7;
    }

    body.menu-open {
      overflow: hidden;
    }

    img {
      display: block;
      width: 100%;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    ul {
      list-style: none;
    }

    h1,
    h2,
    h3,
    h4 {
      font-family: "Cormorant Garamond", Georgia, serif;
      line-height: 1.08;
    }

    p {
      color: var(--muted);
    }

    .container {
      width: min(var(--container), 92%);
      margin-inline: auto;
    }

    .section {
      padding: 100px 0;
    }

    .section-soft {
      background: var(--paper-dark);
    }

    .section-dark {
      color: var(--white);
      background:
        radial-gradient(
          circle at 85% 15%,
          rgba(189, 139, 50, 0.17),
          transparent 35%
        ),
        var(--forest);
    }

    .section-dark h2,
    .section-dark h3 {
      color: var(--white);
    }

    .section-dark p {
      color: #ddd2c1;
    }

    .skip-link {
      position: fixed;
      top: -70px;
      left: 20px;
      z-index: 9999;
      padding: 12px 18px;
      color: var(--forest-dark);
      background: var(--gold);
      border-radius: 8px;
      font-weight: 700;
      transition: top 0.25s ease;
    }

    .skip-link:focus {
      top: 20px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      color: var(--maroon);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      width: 34px;
      height: 2px;
      content: "";
      background: var(--gold);
    }

    .section-dark .eyebrow {
      color: var(--gold-light);
    }

    .section-heading {
      max-width: 760px;
      margin-bottom: 50px;
    }

    .section-heading.center {
      margin-inline: auto;
      text-align: center;
    }

    .section-heading.center .eyebrow::before {
      display: none;
    }

    .section-heading h2 {
      margin-bottom: 18px;
      color: var(--forest);
      font-size: clamp(2.7rem, 5vw, 4.7rem);
    }

    .section-heading p {
      max-width: 680px;
      font-size: 1.02rem;
    }

    .section-heading.center p {
      margin-inline: auto;
    }

    .announcement-bar {
      position: relative;
      z-index: 1100;
      color: #f0e4cf;
      background: var(--forest-dark);
      font-size: 0.78rem;
    }

    .announcement-inner {
      display: flex;
      min-height: 38px;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .announcement-inner span:last-child {
      color: var(--gold-light);
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 250, 240, 0.94);
      backdrop-filter: blur(18px);
    }

    .navbar {
      display: flex;
      min-height: 86px;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
    }

    .brand {
      display: flex;
      min-width: 250px;
      align-items: center;
      gap: 13px;
    }

    .brand-mark {
      display: grid;
      width: 54px;
      height: 54px;
      flex-shrink: 0;
      place-items: center;
      color: var(--gold);
      border: 2px solid var(--gold);
      border-radius: 50%;
      background: var(--forest);
      font-family: Georgia, serif;
      font-size: 1.7rem;
    }

    .brand-text strong {
      display: block;
      color: var(--maroon);
      font-family: "Cormorant Garamond", serif;
      font-size: 1.5rem;
      letter-spacing: 0.14em;
      line-height: 1;
    }

    .brand-text small {
      display: block;
      margin-top: 6px;
      color: var(--forest);
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1.25;
      text-transform: uppercase;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    .nav-links a {
      position: relative;
      color: var(--forest);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .nav-links a:not(.nav-button)::after {
      position: absolute;
      right: 0;
      bottom: -7px;
      left: 0;
      height: 2px;
      content: "";
      background: var(--gold);
      transform: scaleX(0);
      transition: transform 0.25s ease;
    }

    .nav-links a:hover::after,
    .nav-links a.active::after {
      transform: scaleX(1);
    }

    .nav-button {
      padding: 11px 18px;
      border: 1px solid var(--gold);
      border-radius: 999px;
      transition:
        color 0.25s ease,
        background 0.25s ease;
    }

    .nav-button:hover {
      color: var(--white);
      background: var(--forest);
    }

    .menu-toggle {
      display: none;
      width: 46px;
      height: 46px;
      cursor: pointer;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
    }

    .menu-toggle span {
      display: block;
      width: 22px;
      height: 2px;
      margin: 5px auto;
      background: var(--forest);
      transition:
        transform 0.3s ease,
        opacity 0.3s ease;
    }

    .menu-toggle.active span:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }

    .menu-toggle.active span:nth-child(2) {
      opacity: 0;
    }

    .menu-toggle.active span:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }

    .page-hero {
      position: relative;
      display: grid;
      min-height: 70vh;
      overflow: hidden;
      align-items: center;
      color: var(--white);
      isolation: isolate;
    }

    .page-hero-background {
      position: absolute;
      z-index: -3;
      inset: 0;
      background:
        url("images/prosopisia-hero.jpg") center / cover no-repeat,
        linear-gradient(135deg, #1c4334, #705035);
      transform: scale(1.03);
    }

    .page-hero-overlay {
      position: absolute;
      z-index: -2;
      inset: 0;
      background:
        linear-gradient(
          90deg,
          rgba(7, 31, 25, 0.97) 0%,
          rgba(7, 31, 25, 0.83) 48%,
          rgba(104, 36, 42, 0.36) 100%
        );
    }

    .page-hero-decoration {
      position: absolute;
      z-index: -1;
      top: 50%;
      right: -110px;
      width: 430px;
      height: 430px;
      border: 1px solid rgba(223, 189, 118, 0.45);
      border-radius: 50%;
      transform: translateY(-50%);
    }

    .page-hero-decoration::before,
    .page-hero-decoration::after {
      position: absolute;
      content: "";
      border: 1px solid rgba(223, 189, 118, 0.4);
      border-radius: 50%;
      inset: 45px;
    }

    .page-hero-decoration::after {
      inset: 95px;
    }

    .page-hero-content {
      max-width: 850px;
      padding: 105px 0 90px;
    }

    .page-hero .eyebrow {
      color: var(--gold-light);
    }

    .page-hero h1 {
      margin-bottom: 22px;
      font-size: clamp(4rem, 8vw, 7rem);
    }

    .page-hero p {
      max-width: 720px;
      color: #ede3d3;
      font-size: clamp(1rem, 2vw, 1.18rem);
    }

    .breadcrumb {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 30px;
      color: #d5c8b5;
      font-size: 0.82rem;
    }

    .breadcrumb a {
      color: var(--gold-light);
    }

    .overview-grid {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      align-items: center;
      gap: 70px;
    }

    .journal-stage {
      position: relative;
      display: grid;
      min-height: 540px;
      place-items: center;
    }

    .journal-cover {
      position: absolute;
      display: flex;
      width: 280px;
      min-height: 400px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
      text-align: center;
      border: 1px solid #a48a64;
      background: #eee2cd;
      box-shadow: var(--shadow-lg);
    }

    .journal-cover:nth-child(1) {
      transform: translateX(-105px) rotate(-8deg);
      background: #d9c4a3;
    }

    .journal-cover:nth-child(2) {
      transform: translateX(105px) rotate(8deg);
      background: #cdb590;
    }

    .journal-cover:nth-child(3) {
      z-index: 3;
      background: #f4ead7;
    }

    .journal-cover small {
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .journal-cover strong {
      margin: 24px 0;
      color: var(--forest);
      font-family: "Cormorant Garamond", serif;
      font-size: 2.35rem;
      letter-spacing: 0.05em;
    }

    .journal-symbol {
      margin: 14px 0;
      color: var(--forest);
      font-size: 4rem;
    }

    .overview-content h2 {
      margin-bottom: 18px;
      color: var(--forest);
      font-size: clamp(2.8rem, 5vw, 4.8rem);
    }

    .overview-lead {
      margin-bottom: 18px;
      color: var(--maroon);
      font-family: "Cormorant Garamond", serif;
      font-size: 1.55rem;
      font-weight: 600;
    }

    .overview-content p + p {
      margin-top: 17px;
    }

    .facts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 30px;
    }

    .fact-card {
      padding: 20px;
      border: 1px solid var(--border);
      background: var(--paper);
    }

    .fact-card span {
      display: block;
      margin-bottom: 6px;
      color: var(--maroon);
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .fact-card strong {
      color: var(--forest);
      font-size: 0.95rem;
    }

    .meaning-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 70px;
    }

    .meaning-content h2 {
      margin-bottom: 18px;
      color: var(--white);
      font-size: clamp(2.8rem, 5vw, 4.6rem);
    }

    .meaning-content p + p {
      margin-top: 18px;
    }

    .tree-card {
      position: relative;
      display: grid;
      min-height: 480px;
      overflow: hidden;
      place-items: center;
      border: 1px solid rgba(223, 189, 118, 0.28);
      background:
        linear-gradient(
          180deg,
          rgba(7, 31, 25, 0.2),
          rgba(7, 31, 25, 0.88)
        ),
        url("images/khejdi-tree.jpg") center / cover,
        linear-gradient(135deg, #886a3c, #173c30);
    }

    .tree-card-content {
      position: absolute;
      right: 24px;
      bottom: 24px;
      left: 24px;
      padding: 24px;
      border-left: 4px solid var(--gold);
      background: rgba(7, 31, 25, 0.86);
      backdrop-filter: blur(10px);
    }

    .tree-card-content strong {
      display: block;
      margin-bottom: 8px;
      color: var(--gold-light);
      font-family: "Cormorant Garamond", serif;
      font-size: 1.7rem;
    }

    .tree-card-content p {
      color: #dfd4c3;
    }

    .focus-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .focus-card {
      min-height: 260px;
      padding: 28px;
      border: 1px solid var(--border);
      background: var(--paper);
      transition:
        transform 0.3s ease,
        box-shadow 0.3s ease;
    }

    .focus-card:hover {
      box-shadow: var(--shadow-sm);
      transform: translateY(-6px);
    }

    .focus-number {
      display: block;
      margin-bottom: 38px;
      color: var(--gold);
      font-family: "Cormorant Garamond", serif;
      font-size: 2rem;
      font-weight: 700;
    }

    .focus-card h3 {
      margin-bottom: 12px;
      color: var(--maroon);
      font-size: 1.6rem;
    }

    .issues-controls {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 20px;
      margin-bottom: 34px;
    }

    .search-box {
      display: flex;
      align-items: center;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--paper);
    }

    .search-box input {
      width: 100%;
      padding: 13px 18px;
      border: 0;
      outline: 0;
      background: transparent;
    }

    .search-box button {
      min-width: 50px;
      height: 46px;
      cursor: pointer;
      color: var(--forest);
      border: 0;
      background: transparent;
      font-size: 1.1rem;
    }

    .year-filter {
      padding: 12px 16px;
      color: var(--forest);
      border: 1px solid var(--border);
      border-radius: 999px;
      outline: none;
      background: var(--paper);
      font-weight: 700;
    }

    .issues-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .issue-card {
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--paper);
      box-shadow: var(--shadow-sm);
      transition:
        transform 0.3s ease,
        box-shadow 0.3s ease;
    }

    .issue-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-7px);
    }

    .issue-cover {
      display: grid;
      min-height: 330px;
      place-items: center;
      padding: 30px;
      background:
        linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.15),
          rgba(7, 31, 25, 0.4)
        ),
        var(--issue-image, linear-gradient(135deg, #d7c6a8, #6a4f36))
          center / cover;
    }

    .issue-card:nth-child(1) .issue-cover {
      --issue-image: url("images/prosopisia-issue-1.jpg");
    }

    .issue-card:nth-child(2) .issue-cover {
      --issue-image: url("images/prosopisia-issue-2.jpg");
    }

    .issue-card:nth-child(3) .issue-cover {
      --issue-image: url("images/prosopisia-issue-3.jpg");
    }

    .issue-card:nth-child(4) .issue-cover {
      --issue-image: url("images/prosopisia-issue-4.jpg");
    }

    .issue-card:nth-child(5) .issue-cover {
      --issue-image: url("images/prosopisia-issue-5.jpg");
    }

    .issue-card:nth-child(6) .issue-cover {
      --issue-image: url("images/prosopisia-issue-6.jpg");
    }

    .issue-placeholder {
      display: flex;
      width: 205px;
      min-height: 280px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      border: 1px solid #91754e;
      background: rgba(246, 235, 214, 0.94);
      box-shadow: 18px 18px 35px rgba(0, 0, 0, 0.25);
    }

    .issue-placeholder small {
      color: var(--muted);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .issue-placeholder strong {
      margin: 19px 0;
      color: var(--forest);
      font-family: "Cormorant Garamond", serif;
      font-size: 1.8rem;
    }

    .issue-placeholder span {
      color: var(--forest);
      font-size: 2.8rem;
    }

    .issue-content {
      padding: 24px;
    }

    .issue-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .issue-meta span {
      padding: 5px 9px;
      color: var(--maroon);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 800;
    }

    .issue-content h3 {
      margin-bottom: 10px;
      color: var(--forest);
      font-size: 1.65rem;
    }

    .issue-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .small-button {
      display: inline-flex;
      min-height: 40px;
      align-items: center;
      justify-content: center;
      padding: 9px 14px;
      border: 1px solid var(--gold);
      border-radius: 999px;
      color: var(--forest);
      font-size: 0.78rem;
      font-weight: 800;
      transition:
        color 0.25s ease,
        background 0.25s ease;
    }

    .small-button:hover {
      color: var(--white);
      background: var(--forest);
    }

    .editorial-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .editor-card {
      overflow: hidden;
      border: 1px solid rgba(223, 189, 118, 0.24);
      background: rgba(255, 255, 255, 0.04);
    }

    .editor-image {
      display: grid;
      min-height: 250px;
      place-items: center;
      background:
        linear-gradient(
          180deg,
          rgba(13, 51, 40, 0.05),
          rgba(7, 31, 25, 0.8)
        ),
        var(--editor-image, linear-gradient(135deg, #a58b64, #392b25))
          center / cover;
    }

    .editor-card:nth-child(1) .editor-image {
      --editor-image: url("images/editor-anuraag-sharma.jpg");
    }

    .editor-card:nth-child(2) .editor-image {
      --editor-image: url("images/editor-satendra-nandan.jpg");
    }

    .editor-card:nth-child(3) .editor-image {
      --editor-image: url("images/editor-adele-geraghty.jpg");
    }

    .editor-initials {
      display: grid;
      width: 82px;
      height: 82px;
      place-items: center;
      color: var(--gold);
      border: 2px solid var(--gold);
      border-radius: 50%;
      background: rgba(7, 31, 25, 0.88);
      font-family: "Cormorant Garamond", serif;
      font-size: 1.6rem;
      font-weight: 700;
    }

    .editor-content {
      padding: 24px;
    }

    .editor-role {
      display: block;
      margin-bottom: 7px;
      color: var(--gold-light);
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .editor-content h3 {
      margin-bottom: 10px;
      font-size: 1.75rem;
    }

    .submission-grid {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      align-items: start;
      gap: 70px;
    }

    .submission-content h2 {
      margin-bottom: 18px;
      color: var(--forest);
      font-size: clamp(2.8rem, 5vw, 4.7rem);
    }

    .guidelines {
      margin-top: 28px;
      border-top: 1px solid var(--border);
    }

    .guidelines li {
      position: relative;
      padding: 14px 0 14px 26px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
    }

    .guidelines li::before {
      position: absolute;
      top: 25px;
      left: 0;
      width: 8px;
      height: 8px;
      content: "";
      border-radius: 50%;
      background: var(--gold);
    }

    .submission-form {
      padding: 30px;
      border: 1px solid
